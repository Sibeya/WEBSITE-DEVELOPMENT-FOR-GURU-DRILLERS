<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#232338;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lightGrad">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <circle cx="400" cy="300" r="250" fill="url(#lightGrad)" />
  
  <!-- Engineer Silhouette -->
  <g transform="translate(400, 300)" filter="url(#shadow)">
    <!-- Head with Hard Hat -->
    <circle cx="0" cy="-80" r="25" fill="#1C1C2E" />
    <ellipse cx="0" cy="-95" rx="35" ry="15" fill="#FFD700" />
    <rect x="-30" y="-110" width="60" height="10" rx="5" fill="#8B0000" />
    
    <!-- Body -->
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="#1C1C2E" />
    
    <!-- Arms with Tools -->
    <rect x="-60" y="-40" width="20" height="60" rx="10" fill="#1C1C2E" transform="rotate(-30 -50 -10)" />
    <rect x="40" y="-40" width="20" height="60" rx="10" fill="#1C1C2E" transform="rotate(30 50 -10)" />
    
    <!-- Drill Tool -->
    <g transform="rotate(-45 -70 0)">
      <rect x="-5" y="-30" width="10" height="60" fill="#8B0000" />
      <polygon points="-10,-35 10,-35 15,-30 15,-25 -15,-25 -15,-30" fill="#FFD700" />
      <circle cx="0" cy="35" r="8" fill="#FFD700" />
    </g>
  </g>
  
  <!-- Industrial Elements -->
  <g opacity="0.2">
    <rect x="50" y="450" width="100" height="80" fill="#8B0000" />
    <rect x="650" y="100" width="80" height="60" fill="#FFD700" />
    <circle cx="700" cy="200" r="30" fill="#1C1C2E" />
  </g>
  
  <!-- Safety Gear Icon -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.6" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.6" />
    <rect x="-5" y="-25" width="10" height="50" fill="#FFD700" opacity="0.6" />
    <rect x="-25" y="-5" width="50" height="10" fill="#FFD700" opacity="0.6" />
  </g>
</svg>
