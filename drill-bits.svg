<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1C2E;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shineGrad">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <filter id="metallic">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur" />
      <feSpecularLighting result="specOut" in="blur" specularConstant="2" specularExponent="20" lighting-color="white">
        <fePointLight x="-50" y="30" z="200" />
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceGraphic" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#1C1C2E" />
  
  <!-- Drill Bits Display -->
  <g transform="translate(400, 200)">
    <!-- Main Central Drill Bit -->
    <g filter="url(#metallic)">
      <polygon points="-60,-80 60,-80 80,0 60,80 -60,80 -80,0" fill="url(#bitGrad)" />
      <circle cx="0" cy="0" r="50" fill="none" stroke="#FFD700" stroke-width="6" />
      <circle cx="0" cy="0" r="30" fill="none" stroke="#8B0000" stroke-width="4" />
      <circle cx="0" cy="0" r="15" fill="#1C1C2E" />
      
      <!-- Cutting Edges -->
      <polygon points="-80,0 -60,-80 -40,-80" fill="#FFD700" opacity="0.8" />
      <polygon points="80,0 60,-80 40,-80" fill="#FFD700" opacity="0.8" />
      <polygon points="-80,0 -60,80 -40,80" fill="#FFD700" opacity="0.8" />
      <polygon points="80,0 60,80 40,80" fill="#FFD700" opacity="0.8" />
    </g>
    
    <!-- Shine Effect -->
    <circle cx="-20" cy="-30" r="25" fill="url(#shineGrad)" opacity="0.6" />
  </g>
  
  <!-- Secondary Drill Bits -->
  <g opacity="0.7">
    <!-- Left Bit -->
    <g transform="translate(150, 100) scale(0.6)">
      <polygon points="0,-40 40,-40 50,0 40,40 0,40 -10,0" fill="url(#bitGrad)" filter="url(#glow)" />
      <circle cx="20" cy="0" r="25" fill="none" stroke="#FFD700" stroke-width="3" />
    </g>
    
    <!-- Right Bit -->
    <g transform="translate(650, 100) scale(0.6)">
      <polygon points="0,-40 40,-40 50,0 40,40 0,40 -10,0" fill="url(#bitGrad)" filter="url(#glow)" />
      <circle cx="20" cy="0" r="25" fill="none" stroke="#FFD700" stroke-width="3" />
    </g>
  </g>
  
  <!-- Precision Details -->
  <g opacity="0.5">
    <!-- Measurement Lines -->
    <line x1="200" y1="300" x2="300" y2="300" stroke="#FFD700" stroke-width="2" />
    <line x1="500" y1="300" x2="600" y2="300" stroke="#FFD700" stroke-width="2" />
    <circle cx="250" cy="300" r="3" fill="#FFD700" />
    <circle cx="550" cy="300" r="3" fill="#FFD700" />
  </g>
  
  <!-- Technical Specifications -->
  <g transform="translate(100, 350)">
    <text font-family="Arial, sans-serif" font-size="12" fill="#FFD700" font-weight="bold">
      PRECISION ENGINEERED
    </text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">
      High-Speed Steel • Tungsten Carbide • Custom Sizes
    </text>
  </g>
</svg>
