<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#1C1C2E" />
  
  <!-- Service Icons Grid -->
  <g transform="translate(150, 200)">
    <!-- Drill Bit Icon -->
    <g transform="translate(-100, 0)">
      <polygon points="0,-20 15,-20 20,0 15,20 0,20 -5,0" fill="url(#serviceGrad)" filter="url(#glow)" />
      <circle cx="7" cy="0" r="12" fill="none" stroke="#FFD700" stroke-width="2" />
    </g>
    
    <!-- Hammer Icon -->
    <g transform="translate(0, 0)">
      <rect x="-3" y="-25" width="6" height="30" rx="3" fill="url(#serviceGrad)" filter="url(#glow)" />
      <rect x="-15" y="-20" width="30" height="8" rx="4" fill="#FFD700" />
      <circle cx="-10" cy="-16" r="3" fill="#8B0000" />
    </g>
    
    <!-- Gear Icon -->
    <g transform="translate(100, 0)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="url(#serviceGrad)" stroke-width="4" filter="url(#glow)" />
      <circle cx="0" cy="0" r="12" fill="none" stroke="#FFD700" stroke-width="3" />
      <rect x="-3" y="-20" width="6" height="40" fill="#FFD700" />
      <rect x="-20" y="-3" width="40" height="6" fill="#FFD700" />
    </g>
  </g>
  
  <!-- Service Labels -->
  <text x="75" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    DRILL BITS
  </text>
  <text x="175" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    HAMMER DRILLS
  </text>
  <text x="275" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    PRECISION TOOLS
  </text>
  
  <!-- Additional Service Elements -->
  <g transform="translate(300, 100)" opacity="0.3">
    <rect x="0" y="0" width="40" height="60" fill="#8B0000" />
    <circle cx="20" cy="80" r="15" fill="#FFD700" />
    <polygon points="20,100 35,95 40,105 5,105" fill="#1C1C2E" />
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.2">
    <circle cx="50" cy="50" r="20" fill="none" stroke="#FFD700" stroke-width="2" />
    <circle cx="550" cy="350" r="25" fill="none" stroke="#8B0000" stroke-width="2" />
    <rect x="500" y="50" width="30" height="30" fill="#FFD700" />
  </g>
</svg>
