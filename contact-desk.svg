<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lightGrad">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Clean Background -->
  <rect width="800" height="400" fill="url(#deskGrad)" />
  <circle cx="700" cy="100" r="120" fill="url(#lightGrad)" />
  
  <!-- Modern Desk Setup -->
  <g transform="translate(400, 200)">
    <!-- Desk -->
    <ellipse cx="0" cy="50" rx="150" ry="20" fill="#8B6F47" filter="url(#softShadow)" />
    <rect x="-150" y="50" width="300" height="80" fill="#D2691E" />
    
    <!-- Computer Monitor -->
    <g filter="url(#softShadow)">
      <rect x="-60" y="-40" width="120" height="80" rx="5" fill="#1C1C2E" />
      <rect x="-55" y="-35" width="110" height="65" fill="#000000" />
      <rect x="-50" y="-30" width="100" height="55" fill="#4CAF50" />
      <!-- Screen Content -->
      <text x="0" y="-5" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">
        GRD DRILLING
      </text>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="6" fill="#FFFFFF" text-anchor="middle">
        SOLUTIONS
      </text>
      <!-- Monitor Stand -->
      <rect x="-10" y="40" width="20" height="15" fill="#8B6F47" />
      <ellipse cx="0" cy="55" rx="15" ry="3" fill="#6B4423" />
    </g>
    
    <!-- Keyboard -->
    <g filter="url(#softShadow)">
      <rect x="-70" y="70" width="140" height="40" rx="3" fill="#C0C0C0" />
      <rect x="-65" y="73" width="130" height="30" rx="2" fill="#2C2C2C" />
      <!-- Key rows -->
      <g fill="#FFFFFF" opacity="0.8">
        <rect x="-60" y="76" width="120" height="4" rx="1" />
        <rect x="-60" y="82" width="120" height="4" rx="1" />
        <rect x="-60" y="88" width="120" height="4" rx="1" />
      </g>
    </g>
    
    <!-- Phone -->
    <g transform="translate(100, -20)" filter="url(#softShadow)">
      <rect x="-15" y="-25" width="30" height="50" rx="5" fill="#1C1C2E" />
      <rect x="-12" y="-22" width="24" height="40" fill="#000000" />
      <circle cx="0" cy="0" r="8" fill="#4CAF50" />
      <!-- Phone elements -->
      <rect x="-8" y="10" width="16" height="20" rx="2" fill="#FFFFFF" opacity="0.9" />
      <circle cx="0" cy="20" r="2" fill="#4CAF50" />
    </g>
    
    <!-- Coffee Cup -->
    <g transform="translate(-120, 20)" filter="url(#softShadow)">
      <ellipse cx="0" cy="0" rx="12" ry="3" fill="#8B4513" />
      <path d="M -12,0 L -10,-15 L 10,-15 L 12,0" fill="#8B4513" />
      <rect x="-15" y="-18" width="30" height="5" rx="2" fill="#6F4E37" />
      <!-- Steam -->
      <path d="M -5,-20 Q -3,-25 -5,-30 Q -7,-25 -5,-20" fill="#FFFFFF" opacity="0.3" />
      <path d="M 0,-20 Q 2,-25 0,-30 Q -2,-25 0,-20" fill="#FFFFFF" opacity="0.3" />
    </g>
    
    <!-- Plant -->
    <g transform="translate(120, 10)" filter="url(#softShadow)">
      <rect x="-8" y="0" width="16" height="25" fill="#8B4513" />
      <ellipse cx="0" cy="-5" rx="20" ry="15" fill="#4CAF50" />
      <ellipse cx="-10" cy="-8" rx="12" ry="10" fill="#4CAF50" />
      <ellipse cx="10" cy="-6" rx="10" ry="8" fill="#4CAF50" />
    </g>
  </g>
  
  <!-- Welcome Elements -->
  <g transform="translate(100, 80)">
    <text font-family="Arial, sans-serif" font-size="28" fill="#8B0000" font-weight="bold">
      WELCOME TO
    </text>
    <text y="35" font-family="Arial, sans-serif" font-size="32" fill="#FFD700" font-weight="bold">
      GRD SUPPORT
    </text>
    <text y="65" font-family="Arial, sans-serif" font-size="16" fill="#666666">
      We're here to help with your drilling needs
    </text>
  </g>
  
  <!-- Contact Icons -->
  <g transform="translate(600, 320)" opacity="0.6">
    <!-- Email Icon -->
    <g transform="translate(0, 0)">
      <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#1C1C2E" />
      <path d="M -15,-10 L 0,5 L 15,-10" stroke="#FFD700" stroke-width="2" fill="none" />
    </g>
    <!-- Phone Icon -->
    <g transform="translate(0, 40)">
      <rect x="-10" y="-15" width="20" height="30" rx="3" fill="#1C1C2E" />
      <circle cx="0" cy="0" r="8" fill="none" stroke="#FFD700" stroke-width="2" />
      <rect x="-2" y="-8" width="4" height="6" fill="#1C1C2E" />
    </g>
    <!-- Location Icon -->
    <g transform="translate(0, 80)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#FFD700" stroke-width="2" />
      <path d="M 0,-10 L 0,5 L -5,0 L 5,0 Z" fill="#FFD700" />
      <circle cx="0" cy="5" r="3" fill="#FFD700" />
    </g>
  </g>
</svg>
