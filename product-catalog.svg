<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="productGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Clean White Background -->
  <rect width="800" height="600" fill="url(#productGrad)" />
  
  <!-- Product Grid -->
  <g transform="translate(100, 100)">
    <!-- Product 1: DTH Drill Bit -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="150" height="120" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
      <polygon points="75,20 95,20 105,40 95,60 75,60 65,40" fill="#8B0000" />
      <circle cx="85" cy="40" r="15" fill="none" stroke="#FFD700" stroke-width="2" />
      <text x="75" y="90" font-family="Arial, sans-serif" font-size="12" fill="#1C1C2E" text-anchor="middle" font-weight="bold">
        DTH DRILL BIT
      </text>
      <text x="75" y="105" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">
        Model: GRD-DTH-001
      </text>
    </g>
    
    <!-- Product 2: Hammer Drill -->
    <g transform="translate(200, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="150" height="120" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
      <rect x="60" y="15" width="30" height="70" rx="4" fill="#1C1C2E" />
      <rect x="45" y="10" width="60" height="10" rx="5" fill="#8B0000" />
      <circle cx="75" cy="50" r="8" fill="#FFD700" />
      <text x="75" y="90" font-family="Arial, sans-serif" font-size="12" fill="#1C1C2E" text-anchor="middle" font-weight="bold">
        HAMMER DRILL
      </text>
      <text x="75" y="105" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">
        Model: GRD-HD-002
      </text>
    </g>
    
    <!-- Product 3: Button Bit -->
    <g transform="translate(400, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="150" height="120" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
      <circle cx="75" cy="40" r="25" fill="none" stroke="#8B0000" stroke-width="3" />
      <circle cx="75" cy="40" r="15" fill="none" stroke="#FFD700" stroke-width="2" />
      <polygon points="75,25 85,35 75,45 65,35" fill="#FFD700" />
      <text x="75" y="90" font-family="Arial, sans-serif" font-size="12" fill="#1C1C2E" text-anchor="middle" font-weight="bold">
        BUTTON BIT
      </text>
      <text x="75" y="105" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">
        Model: GRD-BB-003
      </text>
    </g>
  </g>
  
  <!-- Additional Products Row -->
  <g transform="translate(100, 280)">
    <!-- Product 4 -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="120" height="100" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
      <polygon points="60,15 75,15 85,30 75,45 60,45 55,30" fill="#8B0000" />
      <circle cx="70" cy="30" r="12" fill="none" stroke="#FFD700" stroke-width="2" />
      <text x="60" y="75" font-family="Arial, sans-serif" font-size="11" fill="#1C1C2E" text-anchor="middle" font-weight="bold">
        TOP HAMMER
      </text>
    </g>
    
    <!-- Product 5 -->
    <g transform="translate(160, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="120" height="100" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
      <rect x="45" y="20" width="30" height="50" rx="3" fill="#1C1C2E" />
      <circle cx="60" cy="35" r="6" fill="#FFD700" />
      <text x="60" y="75" font-family="Arial, sans-serif" font-size="11" fill="#1C1C2E" text-anchor="middle" font-weight="bold">
        CONE BIT
      </text>
    </g>
    
    <!-- Product 6 -->
    <g transform="translate(320, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="120" height="100" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
      <circle cx="60" cy="30" r="20" fill="none" stroke="#8B0000" stroke-width="2" />
      <circle cx="60" cy="30" r="12" fill="none" stroke="#FFD700" stroke-width="2" />
      <rect x="55" y="25" width="10" height="30" fill="#1C1C2E" />
      <text x="60" y="75" font-family="Arial, sans-serif" font-size="11" fill="#1C1C2E" text-anchor="middle" font-weight="bold">
        REAMER BIT
      </text>
    </g>
  </g>
  
  <!-- Quality Badge -->
  <g transform="translate(650, 50)">
    <circle cx="0" cy="0" r="40" fill="#FFD700" opacity="0.1" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD700" stroke-width="2" />
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="#8B0000" text-anchor="middle" font-weight="bold">
      QUALITY
    </text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="10" fill="#8B0000" text-anchor="middle" font-weight="bold">
      CERTIFIED
    </text>
  </g>
  
  <!-- Specifications -->
  <g transform="translate(100, 450)">
    <text font-family="Arial, sans-serif" font-size="14" fill="#1C1C2E" font-weight="bold">
      PRECISION ENGINEERED • INDUSTRIAL GRADE • CUSTOM SIZES
    </text>
    <text y="20" font-family="Arial, sans-serif" font-size="12" fill="#666666">
      Materials: High-Speed Steel, Tungsten Carbide, Diamond Tips
    </text>
    <text y="40" font-family="Arial, sans-serif" font-size="12" fill="#666666">
      Applications: Mining, Construction, Quarrying, Exploration
    </text>
  </g>
</svg>
