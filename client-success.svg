<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F9FA;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lightGrad">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Clean Background -->
  <rect width="800" height="500" fill="url(#successGrad)" />
  <circle cx="700" cy="100" r="150" fill="url(#lightGrad)" />
  
  <!-- Professional Team -->
  <g transform="translate(400, 250)">
    <!-- Central Engineer -->
    <g filter="url(#softShadow)">
      <!-- Body -->
      <ellipse cx="0" cy="20" rx="25" ry="35" fill="#1C1C2E" />
      <!-- Head -->
      <circle cx="0" cy="-15" r="18" fill="#FDBCB4" />
      <!-- Hair -->
      <ellipse cx="0" cy="-25" rx="20" ry="12" fill="#4A4A4A" />
      <!-- Hard Hat -->
      <ellipse cx="0" cy="-30" rx="25" ry="8" fill="#FFD700" />
      <rect x="-20" y="-35" width="40" height="5" rx="2" fill="#8B0000" />
      <!-- Arms -->
      <ellipse cx="-30" cy="10" rx="8" ry="20" fill="#FDBCB4" transform="rotate(-20 -30 10)" />
      <ellipse cx="30" cy="10" rx="8" ry="20" fill="#FDBCB4" transform="rotate(20 30 10)" />
      <!-- Smile -->
      <path d="M -8,-10 Q 0,-5 8,-10" stroke="#4A4A4A" stroke-width="2" fill="none" />
      <!-- Eyes -->
      <circle cx="-5" cy="-15" r="2" fill="#4A4A4A" />
      <circle cx="5" cy="-15" r="2" fill="#4A4A4A" />
    </g>
    
    <!-- Side Team Members -->
    <g transform="translate(-120, 0)" filter="url(#softShadow)">
      <ellipse cx="0" cy="25" rx="20" ry="30" fill="#1C1C2E" />
      <circle cx="0" cy="-5" r="15" fill="#FDBCB4" />
      <ellipse cx="0" cy="-12" rx="16" ry="10" fill="#4A4A4A" />
      <ellipse cx="0" cy="20" rx="6" ry="15" fill="#FDBCB4" transform="rotate(-15 0 20)" />
      <ellipse cx="0" cy="20" rx="6" ry="15" fill="#FDBCB4" transform="rotate(15 0 20)" />
    </g>
    
    <g transform="translate(120, 0)" filter="url(#softShadow)">
      <ellipse cx="0" cy="25" rx="20" ry="30" fill="#1C1C2E" />
      <circle cx="0" cy="-5" r="15" fill="#FDBCB4" />
      <ellipse cx="0" cy="-12" rx="16" ry="10" fill="#4A4A4A" />
      <ellipse cx="0" cy="20" rx="6" ry="15" fill="#FDBCB4" transform="rotate(-15 0 20)" />
      <ellipse cx="0" cy="20" rx="6" ry="15" fill="#FDBCB4" transform="rotate(15 0 20)" />
    </g>
    
    <!-- Success Elements -->
    <g opacity="0.8">
      <!-- Checkmarks -->
      <g transform="translate(-80, -60)">
        <circle cx="0" cy="0" r="15" fill="#4CAF50" />
        <path d="M -8,0 L -3,5 L 8,-6" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" />
      </g>
      <g transform="translate(80, -60)">
        <circle cx="0" cy="0" r="15" fill="#4CAF50" />
        <path d="M -8,0 L -3,5 L 8,-6" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" />
      </g>
      <g transform="translate(0, -80)">
        <circle cx="0" cy="0" r="15" fill="#4CAF50" />
        <path d="M -8,0 L -3,5 L 8,-6" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" />
      </g>
    </g>
  </g>
  
  <!-- Industrial Setting Elements -->
  <g opacity="0.2">
    <!-- Blueprint/Plans -->
    <rect x="50" y="400" width="80" height="60" fill="#1C1C2E" />
    <line x1="60" y1="410" x2="120" y2="410" stroke="#FFD700" stroke-width="2" />
    <line x1="60" y1="420" x2="120" y2="420" stroke="#FFD700" stroke-width="2" />
    <line x1="60" y1="430" x2="120" y2="430" stroke="#FFD700" stroke-width="2" />
    
    <!-- Tools -->
    <rect x="650" y="380" width="60" height="40" fill="#8B0000" />
    <circle cx="680" cy="400" r="8" fill="#FFD700" />
    
    <!-- Safety Equipment -->
    <circle cx="720" cy="420" r="20" fill="none" stroke="#FFD700" stroke-width="3" />
    <rect x="710" y="410" width="20" height="3" fill="#8B0000" />
  </g>
  
  <!-- Trust Indicators -->
  <g transform="translate(100, 100)">
    <text font-family="Arial, sans-serif" font-size="24" fill="#8B0000" font-weight="bold">
      TRUSTED BY
    </text>
    <text y="30" font-family="Arial, sans-serif" font-size="18" fill="#1C1C2E">
      500+ Industrial Clients
    </text>
    <text y="55" font-family="Arial, sans-serif" font-size="16" fill="#666666">
      10+ Years of Excellence
    </text>
  </g>
  
  <!-- Success Message -->
  <g transform="translate(400, 420)">
    <rect x="-100" y="-20" width="200" height="40" rx="20" fill="#4CAF50" opacity="0.1" />
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#4CAF50" text-anchor="middle" font-weight="bold">
      PROJECT SUCCESS RATE: 98.5%
    </text>
  </g>
</svg>
