<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C2E;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#232338;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8B0000;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.1" />
    </linearGradient>
    <pattern id="gridPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#FFD700" stroke-width="0.5" opacity="0.1" />
      <line x1="0" y1="0" x2="40" y2="0" stroke="#FFD700" stroke-width="0.5" opacity="0.1" />
    </pattern>
    <pattern id="dotsPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="2" fill="#8B0000" opacity="0.2" />
    </pattern>
    <radialGradient id="spotlight1">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="spotlight2">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#8B0000;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Main Background Gradient -->
  <rect width="1200" height="600" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid Pattern -->
  <rect width="1200" height="600" fill="url(#gridPattern)" />
  
  <!-- Dot Pattern Overlay -->
  <rect width="1200" height="600" fill="url(#dotsPattern)" />
  
  <!-- Soft Light Spots -->
  <g opacity="0.6" filter="url(#blur)">
    <circle cx="200" cy="150" r="120" fill="url(#spotlight1)" />
    <circle cx="800" cy="400" r="150" fill="url(#spotlight2)" />
    <circle cx="1000" cy="100" r="100" fill="url(#spotlight1)" />
    <circle cx="400" cy="500" r="80" fill="url(#spotlight2)" />
  </g>
  
  <!-- Industrial Elements (very subtle) -->
  <g opacity="0.1">
    <!-- Horizontal Lines -->
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#FFD700" stroke-width="1" />
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#8B0000" stroke-width="1" />
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#FFD700" stroke-width="1" />
    
    <!-- Vertical Lines -->
    <line x1="300" y1="0" x2="300" y2="600" stroke="#8B0000" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="600" stroke="#FFD700" stroke-width="1" />
    <line x1="900" y1="0" x2="900" y2="600" stroke="#8B0000" stroke-width="1" />
  </g>
  
  <!-- Corner Accents -->
  <g opacity="0.3">
    <!-- Top Left -->
    <path d="M 0,0 L 200,0 L 0,100 Z" fill="url(#spotlight2)" />
    <!-- Bottom Right -->
    <path d="M 1200,600 L 1000,600 L 1200,500 Z" fill="url(#spotlight1)" />
  </g>
  
  <!-- Texture Overlay -->
  <rect width="1200" height="600" fill="#FFFFFF" opacity="0.02" />
</svg>
